<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>DOT Team App</title>
<meta name="theme-color" content="#08080F">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#08080F;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .logo-wrap{width:110px;height:auto;margin-bottom:16px;}
  .logo-wrap img{width:100%;height:auto;display:block;}
  h1{color:#fff;font-size:22px;font-weight:700;letter-spacing:0.3px;margin-bottom:4px;text-align:center;}
  p{color:rgba(245,245,247,0.35);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:44px;text-align:center;}
  .cards{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px;}
  .card{display:block;text-decoration:none;border-radius:18px;padding:20px 22px;cursor:pointer;transition:transform 0.15s,opacity 0.15s;active:opacity:0.8;}
  .card:active{transform:scale(0.97);}
  .card-admin{background:linear-gradient(135deg,rgba(204,0,0,0.22),rgba(204,0,0,0.08));border:1px solid rgba(204,0,0,0.35);}
  .card-team{background:linear-gradient(135deg,rgba(10,132,255,0.2),rgba(10,132,255,0.07));border:1px solid rgba(10,132,255,0.32);}
  .card-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:20px;}
  .card-admin .card-icon{background:rgba(204,0,0,0.18);}
  .card-team .card-icon{background:rgba(10,132,255,0.16);}
  .card-title{font-size:16px;font-weight:700;margin-bottom:3px;}
  .card-admin .card-title{color:#FF6B6B;}
  .card-team .card-title{color:#5AABF0;}
  .card-sub{font-size:11px;color:rgba(245,245,247,0.38);}
  .card-arrow{float:right;margin-top:-28px;color:rgba(245,245,247,0.2);font-size:18px;}
  .footer{margin-top:44px;color:rgba(245,245,247,0.18);font-size:10px;letter-spacing:1.5px;text-align:center;}
</style>
</head>
<body>
  <div class="logo-wrap">
    <img src="dot-logo.png" alt="DOT Advertising">
  </div>
  <h1>Team App</h1>
  <p>Unit of Zeebas Cluster LLP</p>

  <div class="cards">
    <a href="/admin" class="card card-admin">
      <div class="card-icon">🖥️</div>
      <div class="card-title">Admin Portal</div>
      <div class="card-sub">Dashboard · Attendance · Payroll</div>
      <div class="card-arrow">›</div>
    </a>
    <a href="/teamlogin" class="card card-team">
      <div class="card-icon">👥</div>
      <div class="card-title">Team Login</div>
      <div class="card-sub">Check-in · Tasks · Salary</div>
      <div class="card-arrow">›</div>
    </a>
  </div>

  <div class="footer">App Designed &copy; by DOT Advertising</div>
</body>
</html>
